        hard: true
        message: "Years in business {actual} below minimum 2"
      - kind: set
        field: borrower.industry
        op: not_in
        value: *stearns_excl
        weight: 3
        hard: true
        message: "Industry {actual} on Stearns exclusion list"
      - kind: boolean
